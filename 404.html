<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #e8ff47;
      --accent2: #ff6b35;
      --text: #f0f0f8;
      --muted: #5a5a7a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      animation: gridDrift 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridDrift {
      0% {
        transform: translate(0, 0);
      }

      100% {
        transform: translate(40px, 40px);
      }
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255, 107, 53, 0.05) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.5;
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.2);
      }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent2);
      border-radius: 4px;
      padding: 52px 56px 44px;
      text-align: center;
      max-width: 520px;
      width: 92vw;
      box-shadow: 0 0 0 1px rgba(255, 107, 53, 0.05), 0 32px 80px rgba(0, 0, 0, 0.6);
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(32px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── 404 ── */
    .error-code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(100px, 24vw, 168px);
      line-height: 0.85;
      letter-spacing: -4px;
      color: var(--accent2);
      text-shadow: 0 0 60px rgba(255, 107, 53, 0.3);
      animation: flicker 7s ease-in-out infinite;
    }

    @keyframes flicker {

      0%,
      93%,
      100% {
        text-shadow: 0 0 60px rgba(255, 107, 53, 0.3);
      }

      94% {
        text-shadow: 0 0 100px rgba(255, 107, 53, 0.7);
      }

      95% {
        text-shadow: 0 0 20px rgba(255, 107, 53, 0.1);
      }

      96% {
        text-shadow: 0 0 80px rgba(255, 107, 53, 0.5);
      }
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 24px 0;
    }

    /* ── Label ── */
    .label-top {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .label-top::before,
    .label-top::after {
      content: '';
      height: 1px;
      width: 28px;
      background: var(--border);
    }

    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.08em;
      color: var(--text);
      margin-bottom: 10px;
    }

    .subtext {
      font-size: 11px;
      line-height: 1.7;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .subtext em {
      color: var(--accent);
      font-style: normal;
    }

    /* ── Home link ── */
    .home-link {
      display: inline-block;
      margin-top: 28px;
      padding: 10px 28px;
      border: 1px solid var(--accent);
      border-radius: 2px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }

    .home-link:hover {
      background: var(--accent);
      color: var(--bg);
    }

    /* ── Countdown strip (if redirecting) ── */
    .redirect-strip {
      margin-top: 24px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 12px 16px;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      display: none;
      /* shown by redirect script when active */
    }

    .redirect-strip span {
      color: var(--accent);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="label-top">error</div>
    <div class="error-code">404</div>
    <div class="divider"></div>
    <div class="headline">Page Not Found</div>
    <p class="subtext">
      The page you're looking for doesn't exist,<br>
      has moved, or never did.<br><br>
      <em>Check the URL</em> or head back home.
    </p>

    <a href="/" class="home-link">← Go Home</a>

    <!-- Shown by redirect script when a timed redirect is active -->
    <div class="redirect-strip" id="redirect-strip">
      Redirecting in <span id="redirect-countdown">5</span>s&hellip;
    </div>
  </div>

  <script>
    window.onload = () => {
      currentURL = window.location.href;
      lowerCaseURL = currentURL.toLowerCase();
      if (currentURL != lowerCaseURL) {
        location.replace(lowerCaseURL);
      }
    };
  </script>

</body>

</html>
